<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<meta name="color-scheme" content="dark">
<title>排気工程管理ボード</title>
<style>
  :root{
    color-scheme:dark;
    --bg:#0d1117;--panel:#161c24;--line:#2a323c;--ink:#f3f7fb;--dim:#8a98a6;
    --offink:#566373;--today:#243140;--weekday:#11161d;
    --sat:#16243a;--sun:#321a20;--done:#5fae6b;
    --radius:8px;--rowH:46px;--dateW:50px;
    --prep:#e89248;--work:#4a8fd6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    display:flex;flex-direction:column;height:100vh;padding-top:env(safe-area-inset-top);}
  header{padding:12px 14px 0;border-bottom:1px solid var(--line);background:var(--bg);}
  .h-top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .title{font-size:12px;letter-spacing:.26em;color:var(--prep);font-weight:700;margin:0;}
  .h-btns{display:flex;gap:8px;}
  .pill{background:var(--panel);border:1px solid var(--line);color:var(--ink);
    border-radius:999px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;}
  .legend{display:flex;gap:14px;padding:8px 0 2px;font-size:11px;color:var(--dim);align-items:center;flex-wrap:wrap;}
  .legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:-1px;}
  .legend .dash{border:1.5px dashed var(--work);background:transparent;}
  .lane-head{display:grid;margin-top:6px;}
  .lane-head .lane-name{text-align:center;font-size:13px;font-weight:700;color:var(--dim);
    padding:8px 0;border-left:1px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
  .lane-head .lane-name .ed{font-size:11px;opacity:.6;}
  .scroll{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;-webkit-overflow-scrolling:touch;background:var(--bg);}
  .grid{display:grid;position:relative;}
  .date-cell{height:var(--rowH);border-bottom:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-size:11px;position:relative;cursor:pointer;background:var(--weekday);}
  .date-cell .dnum{font-size:15px;font-weight:700;line-height:1;color:var(--ink);}
  .date-cell .dwk{color:var(--ink);font-weight:600;}
  .date-cell.sat{background:var(--sat);}
  .date-cell.sun{background:var(--sun);}
  .date-cell.off .dnum,.date-cell.off .dwk{color:var(--offink);font-weight:400;}
  .date-cell.today{outline:2px solid var(--prep);outline-offset:-2px;}
  .date-cell.today .dnum{color:var(--prep);}
  .month-tag{position:absolute;top:2px;left:3px;font-size:9px;color:var(--prep);font-weight:700;}
  .off-dot{position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--offink);}
  .lane-col{position:relative;border-left:1px solid var(--line);}
  .lane-cell{position:absolute;left:0;right:0;height:var(--rowH);border-bottom:1px solid var(--line);background:var(--weekday);}
  .lane-cell.sat{background:var(--sat);}
  .lane-cell.sun{background:var(--sun);}
  .lane-cell.today{outline:2px solid var(--prep);outline-offset:-2px;}
  .taskbar{position:absolute;border-radius:var(--radius);overflow:hidden;cursor:pointer;box-shadow:0 1px 5px rgba(0,0,0,.45);}
  .taskbar.done{opacity:.4;}
  .seg{position:absolute;left:0;right:0;}
  .seg.work{background:var(--work);}
  .seg.stall{background:transparent !important;border:1.5px dashed currentColor;border-left:none;border-right:none;}
  .seg.work.stall{color:var(--work);}
  .tname{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    display:flex;flex-direction:row;align-items:center;justify-content:center;gap:2px;
    color:#0d1115;overflow:hidden;max-height:92%;
    writing-mode:vertical-rl;text-orientation:upright;}
  .tname .tn-kind{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;letter-spacing:1px;
    text-shadow:0 1px 2px rgba(255,255,255,.35);}
  .tname .tn-memo{font-size:11px;font-weight:600;opacity:.8;white-space:nowrap;overflow:hidden;
    text-shadow:0 1px 2px rgba(255,255,255,.35);}
  /* 作業の時刻ピル（複数・横並び対応） */
  .wpill{position:absolute;transform:translate(-50%,-50%);text-align:center;font-size:8px;font-weight:700;
    color:#f3f7fb;background:rgba(13,17,23,.82);border-radius:999px;padding:1px 5px;white-space:nowrap;}
  .wpill.free{background:rgba(13,17,23,.55);font-style:normal;}
  .tedge{position:absolute;left:50%;transform:translate(-50%,-50%);text-align:center;font-size:8px;font-weight:700;
    color:#f3f7fb;background:rgba(13,17,23,.82);border-radius:999px;padding:1px 6px;white-space:nowrap;}
  .badge{position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:8px;font-weight:700;color:#0d1115;}
  .fab{position:fixed;right:18px;bottom:calc(20px + env(safe-area-inset-bottom));
    width:56px;height:56px;border-radius:50%;background:var(--prep);color:#0d1115;
    border:none;font-size:30px;font-weight:700;box-shadow:0 6px 18px rgba(0,0,0,.45);cursor:pointer;z-index:20;}
  .sheet{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:flex-end;justify-content:center;z-index:50;}
  .sheet.show{display:flex;}
  .sheet-inner{background:var(--panel);width:100%;max-width:680px;border-radius:18px 18px 0 0;
    padding:0;border-top:1px solid var(--line);max-height:90vh;display:flex;flex-direction:column;overflow:hidden;}
  .sheet-body{padding:20px 18px 8px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
  .sheet-inner h2{margin:0 0 6px;font-size:17px;}
  label{display:block;font-size:12px;color:var(--dim);margin:14px 0 5px;}
  input,select{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);
    border-radius:var(--radius);padding:13px;font-size:16px;outline:none;}
  input[type=color]{height:46px;padding:5px;}
  .row2{display:flex;gap:10px;}.row2>*{flex:1;}
  .info{font-size:12px;color:var(--dim);background:var(--bg);border:1px solid var(--line);
    border-radius:var(--radius);padding:10px 12px;margin-top:14px;line-height:1.6;}
  .info b{color:var(--ink);}
  .sheet-btns{display:flex;gap:10px;padding:12px 18px calc(14px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);background:var(--panel);flex:0 0 auto;}
  .sheet-btns button{flex:1;border-radius:var(--radius);padding:14px;font-size:15px;font-weight:600;border:none;cursor:pointer;}
  .btn-ghost{background:var(--bg);color:var(--dim);border:1px solid var(--line);}
  .btn-fill{background:var(--prep);color:#0d1115;}
  .btn-danger{background:#c0432e;color:#fff;flex:0 0 auto;}
  .seg-row{display:flex;gap:8px;}
  .seg-row button{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--dim);
    border-radius:var(--radius);padding:11px;font-size:13px;font-weight:600;cursor:pointer;}
  .seg-row button.on{background:var(--prep);border-color:var(--prep);color:#0d1115;}
  .seg-row.worksel button.on{background:var(--work);border-color:var(--work);}
  .cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .cfg-grid .lab{font-size:12px;color:var(--dim);margin-bottom:5px;}
  .stepper{display:flex;align-items:center;gap:12px;}
  .stepper button{width:48px;height:48px;border-radius:var(--radius);background:var(--bg);
    border:1px solid var(--line);color:var(--ink);font-size:22px;font-weight:700;cursor:pointer;}
  .stepper .val{flex:1;text-align:center;font-size:20px;font-weight:700;}
  .stepper .val small{font-size:13px;color:var(--dim);font-weight:400;}
  .cfg-reset{margin-top:14px;width:100%;background:none;border:1px solid var(--line);
    color:var(--dim);border-radius:var(--radius);padding:11px;font-size:13px;cursor:pointer;}
  .addbtn{width:100%;background:var(--bg);border:1px dashed var(--line);color:var(--prep);
    border-radius:var(--radius);padding:10px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;}
  .lanecfg-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .lanecfg-row input{flex:1;}
  .lanecfg-row .x{flex:0 0 auto;background:none;border:1px solid var(--line);color:var(--dim);
    border-radius:8px;width:44px;height:44px;font-size:18px;cursor:pointer;}
  .pillday{border:1px solid var(--line);border-radius:var(--radius);background:var(--bg);padding:10px;margin-bottom:8px;}
  .pillday-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .pillday-head .dl{font-size:13px;font-weight:700;color:var(--ink);}
  .pillday-head .x{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;}
  .pillchips{display:flex;flex-wrap:wrap;gap:6px;}
  .pillchip{display:flex;align-items:center;gap:3px;background:var(--panel);border:1px solid var(--line);
    border-radius:999px;padding:3px 4px 3px 10px;}
  .pillchip input{width:64px;background:none;border:none;color:var(--ink);font-size:13px;padding:3px;}
  .pillchip .x{background:none;border:none;color:var(--dim);font-size:14px;cursor:pointer;padding:0 4px;}
  .pillchip.addchip{cursor:pointer;color:var(--prep);padding:3px 10px;font-size:13px;font-weight:600;}
  .hide{display:none !important;}
</style>
</head>
<body>
<header>
  <div class="h-top">
    <p class="title">排気工程管理</p>
    <div class="h-btns">
      <button class="pill" id="cfgBtn">設定</button>
      <button class="pill" id="todayBtn">今日へ</button>
    </div>
  </div>
  <div class="legend">
    <span><i class="ic-prep"></i><span id="lgPrep">準備</span></span>
    <span><i class="ic-work"></i><span id="lgWork">作業</span></span>
    <span><i class="dash"></i>休日で停止</span>
  </div>
  <div class="lane-head" id="laneHead"></div>
</header>

<div class="scroll" id="scroll"><div class="grid" id="grid"></div></div>
<button class="fab" id="fab">＋</button>

<div class="sheet" id="daySheet"><div class="sheet-inner">
  <div class="sheet-body">
    <h2 id="dayTitle">この日</h2>
    <div class="seg-row" id="dayRow"><button data-v="work">平日（稼働）</button><button data-v="off">休日（停止）</button></div>
  </div>
  <div class="sheet-btns"><button class="btn-ghost" data-close>閉じる</button></div>
</div></div>

<div class="sheet" id="confirmSheet" style="z-index:60;"><div class="sheet-inner">
  <div class="sheet-body">
    <h2 id="confirmTitle">確認</h2>
    <p id="confirmMsg" style="font-size:13px;color:var(--dim);margin:0 0 4px;"></p>
  </div>
  <div class="sheet-btns">
    <button class="btn-ghost" data-close>やめる</button>
    <button class="btn-danger" id="confirmOk" style="flex:1;">実行する</button>
  </div>
</div></div>

<div class="sheet" id="laneSheet"><div class="sheet-inner">
  <div class="sheet-body">
    <h2>列名の変更</h2>
    <label>列の名前</label>
    <input id="laneInput" type="text">
  </div>
  <div class="sheet-btns">
    <button class="btn-danger" id="laneDel">削除</button>
    <button class="btn-ghost" data-close>キャンセル</button>
    <button class="btn-fill" id="laneSave">保存</button>
  </div>
</div></div>

<div class="sheet" id="sheet"><div class="sheet-inner">
  <div class="sheet-body">
    <h2 id="sheetTitle">タスクを追加</h2>
    <label>種類</label>
    <div class="seg-row worksel" id="kindRow">
      <button data-k="prep" id="kindPrep">準備</button><button data-k="work" id="kindWork">作業</button>
    </div>
    <label>列</label>
    <select id="tLane"></select>
    <div id="prepFields">
      <label>開始日時</label>
      <div class="row2"><input id="tStart" type="date"><input id="tTime" type="time" value="17:00"></div>
      <label>所要時間</label>
      <div class="stepper"><button id="hMinus">−</button><div class="val"><span id="hVal">100</span> <small>時間</small></div><button id="hPlus">＋</button></div>
    </div>
    <div id="workFields" class="hide">
      <label>開始日</label><input id="tStartW" type="date">
      <label>長さ</label>
      <div class="stepper"><button id="dMinus">−</button><div class="val"><span id="dVal">3</span> <small>日（稼働日）</small></div><button id="dPlus">＋</button></div>
      <label>この作業の時刻ピル<span id="pillModeNote" style="color:var(--dim);font-weight:400;"></span></label>
      <div id="taskPillCfg"></div>
      <button class="addbtn" id="taskAddDayBtn">＋ 日を追加</button>
      <button class="addbtn" id="taskResetPillBtn" style="color:var(--dim);">全体のデフォルトに戻す</button>
    </div>
    <label>メモ（任意）</label>
    <input id="tName" type="text" placeholder="補足があれば">
    <div class="info" id="schedInfo"></div>
  </div>
  <div class="sheet-btns">
    <button class="btn-danger" id="delBtn" style="display:none;">削除</button>
    <button class="btn-ghost" data-close>キャンセル</button>
    <button class="btn-fill" id="saveBtn">保存</button>
  </div>
</div></div>

<div class="sheet" id="cfgSheet"><div class="sheet-inner">
  <div class="sheet-body">
    <h2>表示設定</h2>
    <label>フェーズ名称</label>
    <div class="row2">
      <div><div class="lab" style="font-size:12px;color:var(--dim);margin-bottom:5px;">準備の呼び名</div><input id="nPrep" type="text"></div>
      <div><div class="lab" style="font-size:12px;color:var(--dim);margin-bottom:5px;">作業の呼び名</div><input id="nWork" type="text"></div>
    </div>
    <label>タスクの色</label>
    <div class="cfg-grid">
      <div><div class="lab">準備</div><input id="cPrep" type="color"></div>
      <div><div class="lab">作業</div><input id="cWork" type="color"></div>
    </div>
    <label>背景・文字</label>
    <div class="cfg-grid">
      <div><div class="lab">背景色</div><input id="cBg" type="color"></div>
      <div><div class="lab">文字色</div><input id="cInk" type="color"></div>
    </div>
    <label>休日の塗りつぶし</label>
    <div class="cfg-grid">
      <div><div class="lab">土曜</div><input id="cSat" type="color"></div>
      <div><div class="lab">日曜</div><input id="cSun" type="color"></div>
    </div>
    <label>作業台（列）</label>
    <div id="laneCfgList"></div>
    <button class="addbtn" id="addLaneBtn">＋ 列を追加</button>
    <label>作業の時刻ピル（デフォルト・日ごと）</label>
    <div id="pillCfg"></div>
    <button class="addbtn" id="addDayBtn">＋ 日を追加</button>
    <button class="cfg-reset" id="cfgReset">色・名称を初期化</button>
  </div>
  <div class="sheet-btns">
    <button class="btn-ghost" data-close>閉じる</button>
    <button class="btn-fill" id="cfgSave">適用</button>
  </div>
</div></div>

<script>
const KEY="kotei-board-v4";
const DEF_CFG={prep:"#e89248",work:"#4a8fd6",bg:"#0d1117",ink:"#f3f7fb",sat:"#16243a",sun:"#321a20",
  namePrep:"準備",nameWork:"作業",
  workPills:[["8:00","9:00","13:00","16:00"],["12:00","14:00"],["フリー"]]};
const DAY_START_H=8, DAY_END_H=18; // ピルの縦位置計算に使う時刻範囲
const DEF_LANES=["作業台 1","作業台 2"];
const RH=46;
let store=load();
let tasks=store.tasks, overrides=store.overrides, cfg=store.cfg, lanes=store.lanes;
let editId=null, editKind="prep", editHours=100, editDays=3, dayKey=null, laneEditIdx=null;

function load(){
  try{const r=localStorage.getItem(KEY);if(r){const d=JSON.parse(r);
    return{tasks:d.tasks||[],overrides:d.overrides||{},cfg:Object.assign({},DEF_CFG,d.cfg||{}),
      lanes:(d.lanes&&d.lanes.length>=1)?d.lanes.slice():DEF_LANES.slice()};}}catch(e){}
  return{tasks:[],overrides:{},cfg:Object.assign({},DEF_CFG),lanes:DEF_LANES.slice()};
}
function save(){localStorage.setItem(KEY,JSON.stringify({tasks,overrides,cfg,lanes}));}

const $=id=>document.getElementById(id);
const ymd=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const parse=s=>{const[y,m,dd]=s.split("-").map(Number);return new Date(y,m-1,dd);};
const WK="日月火水木金土";
const f=d=>(d.getMonth()+1)+"/"+d.getDate()+"("+WK[d.getDay()]+")";
const hm=d=>String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
const fT=d=>f(d)+" "+hm(d);

function isOff(d){const k=ymd(d);if(overrides[k]==="off")return true;if(overrides[k]==="work")return false;const w=d.getDay();return w===0||w===6;}

function prepCells(startStr,timeStr,hours){
  const[hh,mm]=(timeStr||"00:00").split(":").map(Number);
  const start=parse(startStr);start.setHours(hh,mm,0,0);
  const end=new Date(start.getTime()+hours*3600000);
  const out=[];let cur=new Date(start);cur.setHours(0,0,0,0);
  while(cur<=end){const ds=new Date(cur);const de=new Date(cur);de.setHours(24,0,0,0);
    const ss=start>ds?start:ds;const se=end<de?end:de;
    if(se>ss)out.push({date:new Date(ds),topFrac:(ss-ds)/864e5,botFrac:(de-se)/864e5});
    cur.setDate(cur.getDate()+1);}
  return{cells:out,start,end};
}
function workCells(startStr,len){const start=parse(startStr);const out=[];let worked=0,cur=new Date(start),g=0;
  while(worked<len&&g<160){const off=isOff(cur);out.push({date:new Date(cur),stall:off});if(!off)worked++;cur.setDate(cur.getDate()+1);g++;}return out;}

function dateRange(){const today=new Date();today.setHours(0,0,0,0);const start=new Date(today);
  start.setDate(start.getDate()-((start.getDay()+6)%7)-7);
  const days=[];for(let i=0;i<63;i++){const d=new Date(start);d.setDate(d.getDate()+i);days.push(d);}return days;}
let DAYS=dateRange(), dayIndex={};
DAYS.forEach((d,i)=>dayIndex[ymd(d)]=i);

function applyCfg(){const r=document.documentElement.style;
  r.setProperty("--prep",cfg.prep);r.setProperty("--work",cfg.work);r.setProperty("--bg",cfg.bg);
  r.setProperty("--ink",cfg.ink);r.setProperty("--sat",cfg.sat);r.setProperty("--sun",cfg.sun);
  document.querySelectorAll(".ic-prep").forEach(e=>e.style.background=cfg.prep);
  document.querySelectorAll(".ic-work").forEach(e=>e.style.background=cfg.work);
  $("lgPrep").textContent=cfg.namePrep;$("lgWork").textContent=cfg.nameWork;
  $("kindPrep").textContent=cfg.namePrep;$("kindWork").textContent=cfg.nameWork;
  const cols="var(--dateW) repeat("+lanes.length+",1fr)";
  $("grid").style.gridTemplateColumns=cols;$("laneHead").style.gridTemplateColumns=cols;}

function rangeOf(t){let rows=[];
  if(t.kind==="prep"){const pc=prepCells(t.start,t.time,t.hours);rows=pc.cells.map(c=>dayIndex[ymd(c.date)]).filter(r=>r!==undefined);}
  else{const wc=workCells(t.start,t.len);rows=wc.map(c=>dayIndex[ymd(c.date)]).filter(r=>r!==undefined);}
  return rows;}
function computeLayout(){
  const placed=tasks.map(t=>{const rows=rangeOf(t);return{t,rows,min:rows.length?Math.min(...rows):null,max:rows.length?Math.max(...rows):null};}).filter(p=>p.rows.length);
  lanes.forEach((_,lane)=>{const inLane=placed.filter(p=>p.t.lane===lane).sort((a,b)=>a.min-b.min);const slots=[];
    inLane.forEach(p=>{let s=0;while(slots[s]!==undefined&&slots[s]>=p.min)s++;slots[s]=p.max;p.slot=s;});
    inLane.forEach(p=>{let mc=1;inLane.forEach(q=>{if(q!==p&&!(q.max<p.min||q.min>p.max))mc++;});p.cols=Math.max(mc,p.slot+1);});});
  return placed;
}

function render(){
  applyCfg();
  const grid=$("grid");grid.innerHTML="";
  const todayStr=ymd(new Date(new Date().setHours(0,0,0,0)));
  DAYS.forEach((d,i)=>{const off=isOff(d);const w=d.getDay();
    const cell=document.createElement("div");
    cell.className="date-cell"+(off?" off":"")+(w===6?" sat":"")+(w===0?" sun":"")+(ymd(d)===todayStr?" today":"");
    cell.style.gridColumn="1";cell.style.gridRow=(i+1);
    const showM=(d.getDate()===1)||i===0;
    cell.innerHTML=(showM?'<span class="month-tag">'+(d.getMonth()+1)+'月</span>':"")
      +'<span class="dnum">'+d.getDate()+'</span><span class="dwk">'+WK[w]+'</span>'
      +(overrides[ymd(d)]?'<span class="off-dot"></span>':"");
    cell.onclick=()=>openDay(d);grid.appendChild(cell);});
  // レーン見出し生成
  const lh=$("laneHead");lh.innerHTML='<div></div>';
  lanes.forEach((nm,i)=>{const el=document.createElement("div");el.className="lane-name";
    el.innerHTML='<span>'+esc(nm)+'</span><span class="ed">✎</span>';el.onclick=()=>openLane(i);lh.appendChild(el);});
  const cols=[];
  for(let lane=0;lane<lanes.length;lane++){const col=document.createElement("div");col.className="lane-col";
    col.style.gridColumn=(lane+2);col.style.gridRow="1 / "+(DAYS.length+1);
    DAYS.forEach((d,i)=>{const w=d.getDay();const c=document.createElement("div");
      c.className="lane-cell"+(w===6?" sat":"")+(w===0?" sun":"")+(ymd(d)===todayStr?" today":"");
      c.style.top=(i*RH)+"px";c.onclick=()=>openSheet(null,lane,ymd(d));col.appendChild(c);});
    grid.appendChild(col);cols.push(col);}
  grid.style.height=(DAYS.length*RH)+"px";

  const layout=computeLayout();
  layout.forEach(p=>{const t=p.t;const col=cols[t.lane];const baseRow=p.min;
    const bar=document.createElement("div");bar.className="taskbar";
    const ncols=p.cols||1;const gutter=4;const avail=100-gutter*2;
    const wpct=ncols>1?(avail/ncols):Math.min(avail,52);
    const leftBase=ncols>1?(gutter+(p.slot*(avail/ncols))):((100-wpct)/2);
    bar.style.left=leftBase+"%";bar.style.width=wpct+"%";
    bar.style.top=(baseRow*RH+3)+"px";bar.style.height=((p.max-p.min+1)*RH-6)+"px";
    let html="";
    if(t.kind==="prep"){const pc=prepCells(t.start,t.time,t.hours);const n=pc.cells.length;
      pc.cells.forEach((c,idx)=>{const r=dayIndex[ymd(c.date)];if(r===undefined)return;
        const y=(r-baseRow)*RH+c.topFrac*RH;const h=RH-c.topFrac*RH-c.botFrac*RH;
        const op=(0.95-(idx/Math.max(n-1,1))*0.6).toFixed(2);
        html+='<div class="seg" style="top:'+y+'px;height:'+h+'px;background:var(--prep);opacity:'+op+';"></div>';});
      html+=labelHtml(cfg.namePrep,t.name);
      const c0=pc.cells[0], cN=pc.cells[pc.cells.length-1];
      const startRow=dayIndex[ymd(c0.date)];
      const endRow=dayIndex[ymd(cN.date)];
      const barH=(p.max-p.min+1)*RH-6;
      const PILL=6; // ピル高さの半分ぶんの余白
      const clamp=v=>Math.max(PILL,Math.min(barH-PILL,v));
      if(startRow!==undefined){const sy=clamp((startRow-baseRow)*RH+c0.topFrac*RH);
        html+='<span class="tedge" style="top:'+sy+'px;">'+hm(pc.start)+'</span>';}
      if(endRow!==undefined){const ey=clamp((endRow-baseRow)*RH+(1-cN.botFrac)*RH);
        html+='<span class="tedge" style="top:'+ey+'px;">'+hm(pc.end)+'</span>';}
    }else{const wc=workCells(t.start,t.len);
      wc.forEach(c=>{const r=dayIndex[ymd(c.date)];if(r===undefined)return;const y=(r-baseRow)*RH;
        html+='<div class="seg work'+(c.stall?" stall":"")+'" style="top:'+y+'px;height:'+RH+'px;"></div>';});
      // 稼働日のみを順に取り出して、各日のピルセットを配置
      const workDays=wc.filter(c=>!c.stall).map(c=>c.date);
      const pillSets=(t.pills&&t.pills.length)?t.pills:(cfg.workPills||[]);
      const span=Math.max(1,DAY_END_H-DAY_START_H);
      workDays.forEach((wd,di)=>{
        const set=pillSets[di];if(!set||!set.length)return;
        const r=dayIndex[ymd(wd)];if(r===undefined)return;
        const cellTop=(r-baseRow)*RH;
        set.forEach((label,pi)=>{
          let vy;
          const m=String(label).match(/^(\d{1,2}):?(\d{2})?/);
          if(m&&/^\d/.test(label)){const mins=(+m[1])*60+(+(m[2]||0));
            const frac=Math.min(0.92,Math.max(0.08,(mins-DAY_START_H*60)/(span*60)));vy=cellTop+frac*RH;}
          else{vy=cellTop+RH*0.5;}
          const n=set.length;const hx=((pi+0.5)/n)*100;
          const isFree=!(m&&/^\d/.test(label));
          html+='<span class="wpill'+(isFree?" free":"")+'" style="top:'+vy+'px;left:'+hx+'%;">'+esc(label)+'</span>';
        });
      });
      html+=labelHtml(cfg.nameWork,t.name);
    }
    bar.innerHTML=html;bar.onclick=e=>{e.stopPropagation();openSheet(t.id);};col.appendChild(bar);});
}
function esc(s){return(s||"").replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));}
function labelHtml(kindName,memo,top){
  let inner='<span class="tn-kind">'+esc(kindName)+'</span>';
  if(memo&&memo.trim())inner+='<span class="tn-memo">'+esc(memo)+'</span>';
  return '<span class="tname'+(top?" top":"")+'">'+inner+'</span>';
}

function openDay(d){dayKey=ymd(d);$("dayTitle").textContent=(d.getMonth()+1)+"/"+d.getDate()+"（"+WK[d.getDay()]+"）の扱い";
  const cur=isOff(d)?"off":"work";document.querySelectorAll("#dayRow button").forEach(b=>b.classList.toggle("on",b.dataset.v===cur));
  $("daySheet").classList.add("show");}
document.querySelectorAll("#dayRow button").forEach(b=>b.onclick=()=>{const v=b.dataset.v;const d=parse(dayKey);
  const def=(d.getDay()===0||d.getDay()===6)?"off":"work";if(v===def)delete overrides[dayKey];else overrides[dayKey]=v;
  save();$("daySheet").classList.remove("show");render();});

// 列名変更
function openLane(i){laneEditIdx=i;$("laneInput").value=lanes[i];
  $("laneDel").style.display=lanes.length>1?"block":"none";$("laneSheet").classList.add("show");}
$("laneSave").onclick=()=>{const v=$("laneInput").value.trim();if(v){lanes[laneEditIdx]=v;save();render();fillLaneSelect();}$("laneSheet").classList.remove("show");};
$("laneDel").onclick=()=>{if(lanes.length<=1)return;
  $("laneSheet").classList.remove("show");
  showConfirm("この列を削除します。列内のタスクも削除されます。",()=>{
    tasks=tasks.filter(t=>t.lane!==laneEditIdx);
    tasks.forEach(t=>{if(t.lane>laneEditIdx)t.lane--;});
    lanes.splice(laneEditIdx,1);save();render();fillLaneSelect();});};
function fillLaneSelect(){const s=$("tLane");s.innerHTML="";lanes.forEach((nm,i)=>{const o=document.createElement("option");o.value=i;o.textContent=nm;s.appendChild(o);});}

function openSheet(id,lane,startStr){editId=id;fillLaneSelect();
  if(id){const t=tasks.find(x=>x.id===id);$("sheetTitle").textContent="タスクを編集";editKind=t.kind;
    $("tLane").value=t.lane;$("tName").value=t.name||"";
    if(t.kind==="prep"){$("tStart").value=t.start;$("tTime").value=t.time||"17:00";editHours=t.hours||100;}
    else{$("tStartW").value=t.start;editDays=t.len||3;}
    // 個別ピル：あればそれ、なければデフォルトのコピー（=デフォルト継承中）
    taskPillsCustom=!!(t.pills&&t.pills.length);
    taskPills=(t.pills&&t.pills.length?t.pills:(cfg.workPills||[])).map(d=>d.slice());
    $("delBtn").style.display="block";
  }else{$("sheetTitle").textContent="タスクを追加";editKind="prep";editHours=100;editDays=3;
    $("tLane").value=lane||0;$("tStart").value=startStr||ymd(new Date());$("tStartW").value=startStr||ymd(new Date());
    $("tTime").value="17:00";$("tName").value="";$("delBtn").style.display="none";
    taskPillsCustom=false;taskPills=(cfg.workPills||[]).map(d=>d.slice());}
  updateKind();updateSteppers();renderTaskPills();updateInfo();$("sheet").classList.add("show");}
let taskPills=[], taskPillsCustom=false;
function renderTaskPills(){
  $("pillModeNote").textContent=taskPillsCustom?"（このタスク専用）":"（全体のデフォルト）";
  const wrap=$("taskPillCfg");wrap.innerHTML="";
  taskPills.forEach((day,di)=>{const block=document.createElement("div");block.className="pillday";
    let chips='';day.forEach((v,pi)=>{chips+='<span class="pillchip"><input type="text" value="'+esc(v)+'" data-tpv="'+di+'|'+pi+'" placeholder="8:00"><button class="x" data-tpx="'+di+'|'+pi+'">×</button></span>';});
    chips+='<span class="pillchip addchip" data-tpa="'+di+'">＋</span>';
    block.innerHTML='<div class="pillday-head"><span class="dl">'+(di+1)+'日目</span><button class="x" data-tdx="'+di+'">×</button></div><div class="pillchips">'+chips+'</div>';
    wrap.appendChild(block);});
  const mark=()=>{taskPillsCustom=true;$("pillModeNote").textContent="（このタスク専用）";};
  wrap.querySelectorAll("[data-tpv]").forEach(inp=>inp.oninput=e=>{const[di,pi]=e.target.dataset.tpv.split("|").map(Number);taskPills[di][pi]=e.target.value;mark();});
  wrap.querySelectorAll("[data-tpx]").forEach(b=>b.onclick=()=>{const[di,pi]=b.dataset.tpx.split("|").map(Number);taskPills[di].splice(pi,1);mark();renderTaskPills();});
  wrap.querySelectorAll("[data-tpa]").forEach(b=>b.onclick=()=>{taskPills[+b.dataset.tpa].push("");mark();renderTaskPills();});
  wrap.querySelectorAll("[data-tdx]").forEach(b=>b.onclick=()=>{taskPills.splice(+b.dataset.tdx,1);mark();renderTaskPills();});
}
$("taskAddDayBtn").onclick=()=>{taskPills.push([""]);taskPillsCustom=true;renderTaskPills();};
$("taskResetPillBtn").onclick=()=>{taskPillsCustom=false;taskPills=(cfg.workPills||[]).map(d=>d.slice());renderTaskPills();};
function updateKind(){document.querySelectorAll("#kindRow button").forEach(b=>b.classList.toggle("on",b.dataset.k===editKind));
  $("prepFields").classList.toggle("hide",editKind!=="prep");$("workFields").classList.toggle("hide",editKind!=="work");}
document.querySelectorAll("#kindRow button").forEach(b=>b.onclick=()=>{editKind=b.dataset.k;updateKind();updateInfo();});
function updateSteppers(){$("hVal").textContent=editHours;$("dVal").textContent=editDays;}
$("hMinus").onclick=()=>{if(editHours>1){editHours-=editHours>10?10:1;updateSteppers();updateInfo();}};
$("hPlus").onclick=()=>{if(editHours<500){editHours+=editHours>=10?10:1;updateSteppers();updateInfo();}};
$("dMinus").onclick=()=>{if(editDays>1){editDays--;updateSteppers();updateInfo();}};
$("dPlus").onclick=()=>{if(editDays<40){editDays++;updateSteppers();updateInfo();}};

function updateInfo(){if(editKind==="prep"){const s=$("tStart").value;if(!s){$("schedInfo").textContent="";return;}
    const pc=prepCells(s,$("tTime").value,editHours);
    $("schedInfo").innerHTML=cfg.namePrep+"：<b>"+fT(pc.start)+"</b><br>↓ "+editHours+"時間（連続）<br>終了：<b>"+fT(pc.end)+"</b>";
  }else{const s=$("tStartW").value;if(!s){$("schedInfo").textContent="";return;}
    const wc=workCells(s,editDays);const fin=wc.filter(c=>!c.stall).pop().date;const stalls=wc.filter(c=>c.stall).length;
    $("schedInfo").innerHTML=cfg.nameWork+"：<b>"+f(wc[0].date)+"〜"+f(fin)+"</b>（稼働"+editDays+"日）<br>"
      +(stalls?'<span style="color:var(--work)">途中の休日 '+stalls+'日ぶんずれ</span><br>':"")+"完了予定：<b>"+f(fin)+"</b>";}}
["tStart","tTime","tStartW"].forEach(id=>$(id).addEventListener("change",updateInfo));

$("saveBtn").onclick=()=>{const name=$("tName").value.trim();
  if(editKind==="prep"){const start=$("tStart").value;if(!start)return;
    const obj={lane:+$("tLane").value,kind:"prep",start,time:$("tTime").value,hours:editHours,name};
    if(editId)Object.assign(tasks.find(x=>x.id===editId),obj);else tasks.push(Object.assign({id:Date.now()+""},obj));
  }else{const start=$("tStartW").value;if(!start)return;
    const obj={lane:+$("tLane").value,kind:"work",start,len:editDays,name};
    if(taskPillsCustom){obj.pills=taskPills.map(d=>d.map(v=>v.trim()).filter(Boolean));}
    if(editId){const t=tasks.find(x=>x.id===editId);for(const k in t)if(k!=="id")delete t[k];Object.assign(t,obj);}
    else tasks.push(Object.assign({id:Date.now()+""},obj));}
  save();$("sheet").classList.remove("show");render();};
let confirmCb=null;
function showConfirm(msg,cb,label){$("confirmMsg").textContent=msg;
  $("confirmOk").textContent=label||"実行する";confirmCb=cb;$("confirmSheet").classList.add("show");}
$("confirmOk").onclick=()=>{$("confirmSheet").classList.remove("show");if(confirmCb){const cb=confirmCb;confirmCb=null;cb();}};
$("delBtn").onclick=()=>{$("sheet").classList.remove("show");
  showConfirm("このタスクを削除します。元に戻せません。",()=>{tasks=tasks.filter(x=>x.id!==editId);save();render();},"削除する");};

let cfgLanes=[], cfgPills=[];
function renderLaneCfg(){const wrap=$("laneCfgList");wrap.innerHTML="";
  cfgLanes.forEach((nm,i)=>{const row=document.createElement("div");row.className="lanecfg-row";
    row.innerHTML='<input type="text" value="'+esc(nm)+'" data-li="'+i+'">'
      +(cfgLanes.length>1?'<button class="x" data-lx="'+i+'">×</button>':'');
    wrap.appendChild(row);});
  wrap.querySelectorAll("[data-li]").forEach(inp=>inp.oninput=e=>cfgLanes[+e.target.dataset.li]=e.target.value);
  wrap.querySelectorAll("[data-lx]").forEach(b=>b.onclick=()=>{cfgLanes.splice(+b.dataset.lx,1);renderLaneCfg();});}
function renderPillCfg(){const wrap=$("pillCfg");wrap.innerHTML="";
  cfgPills.forEach((day,di)=>{const block=document.createElement("div");block.className="pillday";
    let chips='';day.forEach((v,pi)=>{chips+='<span class="pillchip"><input type="text" value="'+esc(v)+'" data-pv="'+di+'|'+pi+'" placeholder="8:00"><button class="x" data-px="'+di+'|'+pi+'">×</button></span>';});
    chips+='<span class="pillchip addchip" data-pa="'+di+'">＋</span>';
    block.innerHTML='<div class="pillday-head"><span class="dl">'+(di+1)+'日目</span><button class="x" data-dx="'+di+'">×</button></div><div class="pillchips">'+chips+'</div>';
    wrap.appendChild(block);});
  wrap.querySelectorAll("[data-pv]").forEach(inp=>inp.oninput=e=>{const[di,pi]=e.target.dataset.pv.split("|").map(Number);cfgPills[di][pi]=e.target.value;});
  wrap.querySelectorAll("[data-px]").forEach(b=>b.onclick=()=>{const[di,pi]=b.dataset.px.split("|").map(Number);cfgPills[di].splice(pi,1);renderPillCfg();});
  wrap.querySelectorAll("[data-pa]").forEach(b=>b.onclick=()=>{cfgPills[+b.dataset.pa].push("");renderPillCfg();});
  wrap.querySelectorAll("[data-dx]").forEach(b=>b.onclick=()=>{cfgPills.splice(+b.dataset.dx,1);renderPillCfg();});}
$("addLaneBtn").onclick=()=>{cfgLanes.push(cfg.nameWork+" "+(cfgLanes.length+1));renderLaneCfg();};
$("addDayBtn").onclick=()=>{cfgPills.push([""]);renderPillCfg();};

$("cfgBtn").onclick=()=>{$("cPrep").value=cfg.prep;$("cWork").value=cfg.work;$("cBg").value=cfg.bg;$("cInk").value=cfg.ink;
  $("cSat").value=cfg.sat;$("cSun").value=cfg.sun;$("nPrep").value=cfg.namePrep;$("nWork").value=cfg.nameWork;
  cfgLanes=lanes.slice();cfgPills=(cfg.workPills||[]).map(d=>d.slice());renderLaneCfg();renderPillCfg();
  $("cfgSheet").classList.add("show");};
$("cfgSave").onclick=()=>{cfg.prep=$("cPrep").value;cfg.work=$("cWork").value;cfg.bg=$("cBg").value;cfg.ink=$("cInk").value;
  cfg.sat=$("cSat").value;cfg.sun=$("cSun").value;cfg.namePrep=$("nPrep").value.trim()||"準備";cfg.nameWork=$("nWork").value.trim()||"作業";
  // 列：空名は補完、最低1列
  let nl=cfgLanes.map((n,i)=>n.trim()||("作業台 "+(i+1)));if(!nl.length)nl=["作業台 1"];
  // タスクのlaneが範囲外になったら最終列に寄せる
  tasks.forEach(t=>{if(t.lane>=nl.length)t.lane=nl.length-1;});
  lanes=nl;
  // ピル：空項目を除去、空の日は空配列で保持
  cfg.workPills=cfgPills.map(d=>d.map(v=>v.trim()).filter(Boolean));
  save();$("cfgSheet").classList.remove("show");render();fillLaneSelect();};
$("cfgReset").onclick=()=>{const wp=cfg.workPills;cfg=Object.assign({},DEF_CFG,{workPills:wp});
  $("cPrep").value=cfg.prep;$("cWork").value=cfg.work;$("cBg").value=cfg.bg;$("cInk").value=cfg.ink;
  $("cSat").value=cfg.sat;$("cSun").value=cfg.sun;$("nPrep").value=cfg.namePrep;$("nWork").value=cfg.nameWork;};

$("fab").onclick=()=>openSheet(null,0,ymd(new Date()));
document.querySelectorAll("[data-close]").forEach(b=>b.onclick=e=>e.target.closest(".sheet").classList.remove("show"));
document.querySelectorAll(".sheet").forEach(s=>s.addEventListener("click",e=>{if(e.target===s)s.classList.remove("show");}));
$("todayBtn").onclick=scrollToToday;
function scrollToToday(){const i=dayIndex[ymd(new Date(new Date().setHours(0,0,0,0)))];if(i!==undefined)$("scroll").scrollTop=Math.max(0,i*RH-120);}

fillLaneSelect();render();scrollToToday();
</script>
</body>
</html>
